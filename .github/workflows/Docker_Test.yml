name: DDTV_Test

on:
  workflow_dispatch:
  push:
    branches: 
      - test

jobs:
  job1:
    runs-on: ubuntu-latest
    outputs:
      output1: ${{ steps.set-output.outputs.output1 }}
    steps:
      - id: set-output
        run: |
         a="1\n
            2\n
            3\n"
         echo ::set-output name=output1::"${a//$'\n'/'%0A'}"

  job2:
    runs-on: ubuntu-latest
    needs: [job1]
    steps:
      - run: |
                    echo "Output1: ${{ needs.job1.outputs.output1 }//1/2333}"
