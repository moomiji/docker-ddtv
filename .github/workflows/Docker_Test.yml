name: DDTV_Test

on:
  workflow_dispatch:
  push:
    branches: 
      - test

env:
  images: debug

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: Metadata for images
        id: metadata
        uses: docker/metadata-action@v3
        with:
          images: ${{ env.images }}
          flavor: |
            latest=true
            suffix=-alpine,onlatest=true
          tags: |
            type=raw,value=${{ inputs.verall }}
            type=raw,value=3.0
            
