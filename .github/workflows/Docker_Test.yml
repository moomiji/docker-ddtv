name: DDTV_Test

on:
  release:
    types: [released]
  watch: # 合并删除
    types: [started]
  push:
    branches: 
      - test
    paths:
      - '.github/**'

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.ref_name }}
      - name: Metadata for images
        id: metadata
        uses: ./.github/workflows/test.yml
        with:
          test: test
