name: DDTV_Test

on:
  release:
    types: [released]
  watch: # 合并删除
    types: [started]
  push:
    branches: 
      - test

# *_PROJECT 为项目名兼路径名，更改后记得修改 文件存放位置 和 prepare.sh
env:
  DOTNET_VERSION: '6.0' # 只允许 *.*
  BUILD_PATH: ./Docker
  DEPS_PROJECT: ddtv/deps
  CLI_PROJECT: ddtv/cli
  BACK_END_PROJECT: ddtv/webserver
  FRONT_END_PROJECT: ddtv/webui
  PLATFORMS: linux/amd64, linux/arm64, linux/arm/v7

jobs:
  Prepare:
    runs-on: ubuntu-latest
    outputs:
      verall: ${{ steps.version.outputs.all }} # all="Ver3.0.1.9"
      vertwo: ${{ steps.version.outputs.two }} # two="3.0"
    steps:
      - name: Output Version
        id: version
        run: |
          Version=$(curl -sX GET "https://api.github.com/repos/CHKZL/DDTV/releases/latest" | awk '/tag_name/{print $4;exit}' FS='["]')
          Version_major=${Version%%.*} && Version_major=${Version_major:0-1}
          Version_minor=${Version#*.}  && Version_minor=${Version_minor:0:1}
          echo ::set-output name=all::${Version}
          echo ::set-output name=two::${Version_major}.${Version_minor}

  WEBUI_Nginx-Alpine:
    if: false
    needs: [Prepare]
    uses: ./.github/workflows/Docker_Build_Push.yml
    with:
      os_id:      alpine
      verall:     ${{ needs.Prepare.outputs.verall }}
      vertwo:     ${{ needs.Prepare.outputs.vertwo }}
      images:     ghcr.io/${{ github.actor }}/$FRONT_END_PROJECT
      context:    $BUILD_PATH/$FRONT_END_PROJECT
      platforms:  linux/amd64, linux/arm64, linux/arm/v7, linux/386, linux/arm/v6, linux/ppc64le, linux/s390x

  Deps_Alpine:
    needs: [Prepare]
    uses: ./.github/workflows/Docker_Build_Push.yml
    with:
      os_id:      alpine
      verall:     ${{ needs.Prepare.outputs.verall }}
      vertwo:     ${{ needs.Prepare.outputs.vertwo }}
      images:     ghcr.io/${{ github.actor }}/$DEPS_PROJECT
      context:    $BUILD_PATH/$DEPS_PROJECT
      platforms:  $PLATFORMS
      build-args: DOTNET_VERSION=$DOTNET_VERSION

  Deps_Debian:
    needs: [Prepare]
    uses: ./.github/workflows/Docker_Build_Push.yml
    with:
      os_id:      debian
      verall:     ${{ needs.Prepare.outputs.verall }}
      vertwo:     ${{ needs.Prepare.outputs.vertwo }}
      images:     ghcr.io/${{ github.actor }}/$DEPS_PROJECT
      context:    $BUILD_PATH/$DEPS_PROJECT
      platforms:  $PLATFORMS
      build-args: DOTNET_VERSION=$DOTNET_VERSION

  CLI_Alpine:
    needs: [Deps_Alpine]
    uses: ./.github/workflows/Docker_Build_Push.yml
    with:
      os_id:      alpine
      verall:     ${{ needs.Prepare.outputs.verall }}
      vertwo:     ${{ needs.Prepare.outputs.vertwo }}
      images:     ghcr.io/${{ github.actor }}/$CLI_PROJECT
      context:    $BUILD_PATH/$CLI_PROJECT
      platforms:  $PLATFORMS
      build-args: REPO=ghcr.io/${{ github.actor }}/$DEPS_PROJECT:latest-alpine

  CLI_Debian:
    needs: [Deps_Debian]
    uses: ./.github/workflows/Docker_Build_Push.yml
    with:
      os_id:      debian
      verall:     ${{ needs.Prepare.outputs.verall }}
      vertwo:     ${{ needs.Prepare.outputs.vertwo }}
      images:     ghcr.io/${{ github.actor }}/$CLI_PROJECT
      context:    $BUILD_PATH/$CLI_PROJECT
      platforms:  $PLATFORMS
      build-args: REPO=ghcr.io/${{ github.actor }}/$DEPS_PROJECT:latest

  WEBServer_Alpine:
    needs: [Deps_Alpine]
    uses: ./.github/workflows/Docker_Build_Push.yml
    with:
      os_id:      alpine
      verall:     ${{ needs.Prepare.outputs.verall }}
      vertwo:     ${{ needs.Prepare.outputs.vertwo }}
      images:     ghcr.io/${{ github.actor }}/$BACK_END_PROJECT
      context:    $BUILD_PATH/$BACK_END_PROJECT
      platforms:  $PLATFORMS
      build-args: REPO=ghcr.io/${{ github.actor }}/$DEPS_PROJECT:latest-alpine

  WEBServer_Debian:
    needs: [Deps_Debian]
    uses: ./.github/workflows/Docker_Build_Push.yml
    with:
      os_id:      debian
      verall:     ${{ needs.Prepare.outputs.verall }}
      vertwo:     ${{ needs.Prepare.outputs.vertwo }}
      images:     ghcr.io/${{ github.actor }}/$BACK_END_PROJECT
      context:    $BUILD_PATH/$BACK_END_PROJECT
      platforms:  $PLATFORMS
      build-args: REPO=ghcr.io/${{ github.actor }}/$DEPS_PROJECT:latest
