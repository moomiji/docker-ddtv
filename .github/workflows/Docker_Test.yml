name: DDTV_Test

on:
  workflow_dispatch:
  push:
    branches: 
      - test

env:
  DDTVMOMIJI: ddtv # 合并删掉
####################  WEBServer: webserver
  WEBUI: webui
  DOTNET_VERSION: '6.0.x'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare # 输出版本(exp: ddtv_version="Ver3.0.1.9" ddtv_version_major="3.0") | find . -name "*.sh" 不允许有带空格的sh文件
        id: prepare
        run: |
          Version=$(curl -sX GET "https://api.github.com/repos/CHKZL/DDTV/releases/latest" | awk '/tag_name/{print $4;exit}' FS='["]')
          Version_major=${Version%%.*} && Version_major=${Version_major:0-1}
          Version_minor=${Version#*.}  && Version_minor=${Version_minor:0:1}
          echo ::set-output name=ddtv_version::${Version}
          echo ::set-output name=ddtv_version_major::${Version_major}.${Version_minor}

      - name: Metadata for test images
        id: test
        uses: docker/metadata-action@v3
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DDTVMOMIJI }}${{ env.WEBServer }}
            ghcr.io/${{ github.actor }}/ddtv${{ env.WEBServer }}
          flavor: |
            latest=true
          tags: |
            type=raw,value=${{ steps.prepare.outputs.ddtv_version }}
            type=raw,value=${{ steps.prepare.outputs.ddtv_version_major }}

      - name: Build and push WEBServer(debian)
        if: github.event_name == 'release'
        uses: docker/build-push-action@v2
        with:
          context: Docker/WEBServer/
          file: Docker/WEBServer/Dockerfile.debian
          platforms: linux/amd64
          push: true
          tags: ${{ steps.test.outputs.tags }}
          labels: $( echo "${{ steps.test.outputs.tags }}" | tr "\n" "," )
