name: DDTV_Test

on:
  workflow_dispatch:
  push:
    branches: 
      - test

jobs:
  job1:
    runs-on: ubuntu-latest
    outputs:
      output1: ${{ steps.set-output.outputs.output1 }}
    steps:
      - id: set-output
        run: |
                    echo "::set-output name=output1::'Hello World'"
  job2:
    runs-on: ubuntu-latest
    needs: [job1]
    steps:
      - run: |
                    echo "Output1: ${{ needs.job1.outputs.output1 }}"
